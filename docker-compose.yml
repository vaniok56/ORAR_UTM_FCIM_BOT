services:

  mysql:
    image: mysql:8.0
    container_name: orar_mysql
    restart: always
    user: "1000:1000"
    volumes:
      - ./mysql:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./configs/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    command: >
      --default-authentication-plugin=caching_sha2_password --log-error-verbosity=1 --console=1 --default-time-zone='Europe/Chisinau' --log-timestamps=system
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 1s
      timeout: 5s
      retries: 5
    networks:
      - orar_network
    environment:
      - TZ=Europe/Chisinau
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "mysql"

  orarbot:
    build:
      context: .
      dockerfile: Dockerfile
    image: orarbot:latest
    container_name: orar_bot
    restart: always
    env_file: configs/mysql.env
    volumes:
      - ./sessions:/sessions
      - ./src/dynamic_group_lists.py:/src/dynamic_group_lists.py
      - ./logs:/logs
      - ./backups:/backups
      - ./schedules:/schedules
    environment:
      - MYSQL_HOST=mysql
      - TZ=Europe/Chisinau
      - PYTHONUNBUFFERED=1
    tty: true
    networks:
      - orar_network
  restarter:
    image: docker:rc-cli
    container_name: restarter
    restart: always
    volumes: [ "/var/run/docker.sock:/var/run/docker.sock" ]
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        while true; do
          if [ $(date +'%H:%M') = 17:10 ] || [ $(date +'%H:%M') = 04:00 ]; then
            docker restart orar_bot
          fi
          sleep 60
        done
networks:
  orar_network:
    driver: bridge
